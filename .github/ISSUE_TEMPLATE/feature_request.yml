name: Feature idea
description: Suggest an improvement or a new feature.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What's your idea?
      description: What would you like the extension to do?
      placeholder: "e.g. Show RMP written comments in the hover card."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would this help?
      placeholder: "e.g. The number rating alone doesn't explain *why* a professor is rated that way."
    validations:
      required: false
